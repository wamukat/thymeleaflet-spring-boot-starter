<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!--
/**
 * Story configuration diagnostic alert.
 *
 * Shows safe story YAML load diagnostics without exposing developer details.
 *
 * @fragment alert - Story configuration diagnostic alert
 * @param diagnostic {@code StoryConfigurationDiagnostic} [required] Diagnostic DTO
 * @example <div th:replace="~{thymeleaflet/fragments/story-configuration-diagnostic :: alert(${storyConfigurationDiagnostic})}"></div>
 */
-->
<div th:fragment="alert(diagnostic)"
     th:with="resolvedDiagnostic=${diagnostic ?: storyConfigurationDiagnostic}"
     th:if="${diagnostic != null || storyConfigurationDiagnostic != null}"
     class="rounded-md border border-red-300 bg-red-50 px-3 py-2 text-xs text-red-900">
    <div class="font-semibold" th:text="${resolvedDiagnostic.code}">STORY_YAML_LOAD_FAILED</div>
    <div th:text="${resolvedDiagnostic.userSafeMessage}">
        Story YAML was found but could not be loaded.
    </div>
</div>

</body>
</html>
