   * @param label {@code String} [required] Label text
   * @param description {@code String} [optional=] Description text
   * @example <div th:replace="~{fragments/source-snippet-sample :: commentedFragment(label='Title', description='Body')}"></div>
   */
  -->
  <article th:fragment="commentedFragment(label, description)">
    <h2 th:text="${label}">Title</h2>
    <p th:text="${description}">Body</p>
  </article>

  <!--
  /// Java 25 line documented fragment
  ///
  /// @param title {@code String} [required] Title text
  /// @param body {@code String} [optional=] Body text
  /// @example <div th:replace="~{fragments/source-snippet-sample :: lineDocumentedFragment(title='Title', body='Body')}"></div>
  -->
  <section th:fragment="lineDocumentedFragment(title, body)">
    <h2 th:text="${title}">Title</h2>
    <p th:text="${body}">Body</p>
  </section>

  <div th:fragment="shortFragment">short</div>
</body>
