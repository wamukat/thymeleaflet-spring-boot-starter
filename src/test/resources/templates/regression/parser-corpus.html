<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<!--
 /**
  * Parser regression corpus for Thymeleaf attribute extraction.
  * @fragment dataThList
  * @model view.items[].label {@code String} [required] Item labels
  */
-->
<section th:fragment="dataThList">
  <ul>
    <li data-th-each="item : ${view.items}" data-th-text="${item.label}">Item</li>
  </ul>
</section>

<!--
 /**
  * Parser regression corpus for quoted fragment selectors.
  * @fragment quotedSelectorShell
  * @model view.label {@code String} [required] Label
  */
-->
<section th:fragment="quotedSelectorShell">
  <th:block th:replace="~{'regression/parser-corpus' :: quotedTarget(label=${view.label})}"></th:block>
</section>

<span th:fragment="quotedTarget(label)" th:text="${label}">Label</span>

<!--
 /**
  * Parser regression corpus for no-arg fragment references with empty parentheses.
  * Protects GH-149-style calls where a no-arg child fragment is referenced as name().
  * @fragment noArgReferenceShell
  */
-->
<section th:fragment="noArgReferenceShell">
  <div th:replace="~{regression/parser-corpus :: noArgReferenceTarget()}"></div>
</section>

<header th:fragment="noArgReferenceTarget">Corpus topbar OK</header>

<!--
 /**
  * Parser regression corpus for nested fragments and subtree extraction.
  * @fragment nestedFragmentShell
  * @model view.nested.title {@code String} [required] Nested title
  */
-->
<article th:fragment="nestedFragmentShell">
  <section>
    <div th:fragment="nestedChild(title)" th:text="${title}">Nested title</div>
    <th:block th:replace="~{regression/parser-corpus :: quotedTarget(label=${view.nested.title})}"></th:block>
  </section>
</article>

<!--
 /**
  * Parser regression corpus for malformed-but-browser-tolerated HTML.
  * Keeps structured parser coverage separate from render coverage.
  * @fragment malformedHtmlShell
  * @model view.malformed.label {@code String} [required] Malformed label
  */
-->
<section th:fragment="malformedHtmlShell">
  <div>
    <span data-th-text="${view.malformed.label}">Malformed label
</section>

<!--
 /**
  * Parser regression corpus for mixed dependency attributes and text/comment extraction.
  * Covers th:replace, th:insert, th:include, and data-th-* siblings with quoted > values.
  * @fragment mixedDependencyShell
  * @model view.mixed.title {@code String} [required] Mixed title
  */
-->
<section th:fragment="mixedDependencyShell"
         th:with="label='Ready > Draft', local=${view.mixed.title}">
  <!-- Parser should keep ${commented.out} inside comments only. -->
  Hello ${view.mixed.title}
  <div th:replace="~{regression/parser-corpus :: quotedTarget(label=${view.mixed.title})}"></div>
  <div th:insert="~{'regression/parser-corpus' :: noArgReferenceTarget()}"></div>
  <div th:include="~{regression/parser-corpus :: nestedChild(title='Included > Nested')}"></div>
  <span data-th-replace="~{'regression/parser-corpus' :: quotedTarget(label='Data > Replace')}"></span>
  <span data-th-insert="~{regression/parser-corpus :: noArgReferenceTarget()}"></span>
  <span data-th-include="~{regression/parser-corpus :: nestedChild(title=${view.mixed.title})}"></span>
  <input disabled data-th-value="${view.mixed.title}" />
</section>

<!--
 /**
  * Parser regression corpus for sibling subtree boundaries.
  * @fragment siblingBoundaryA
  */
-->
<section th:fragment="siblingBoundaryA">
  <span th:text="${view.boundary.a}">A</span>
</section>

<section th:fragment="siblingBoundaryB">
  <span th:text="${view.boundary.b}">B</span>
</section>
</body>
</html>
